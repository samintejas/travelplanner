version: '3.8'

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend
    volumes:
      - ./frontend/src:/app/src
    networks:
      - travelplanner-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin123}
    depends_on:
      chromadb:
        condition: service_healthy
    volumes:
      - ./backend/app:/app/app
    networks:
      - travelplanner-network

  chromadb:
    image: chromadb/chroma:0.5.0
    ports:
      - "8001:8000"
    volumes:
      - ./data/chromadb:/chroma/chroma
    environment:
      - ANONYMIZED_TELEMETRY=false
      - IS_PERSISTENT=TRUE
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:8000/api/v1/heartbeat\")'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - travelplanner-network

networks:
  travelplanner-network:
    driver: bridge
